name: Test

on:
  push:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Install Go
      uses: actions/setup-go@v2.1.3
      with:
        go-version: 1.15
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Diff
      uses: technote-space/get-diff-action@v4
      with:
        PATTERNS: |
          **/**.go
          go.mod
          go.sum
    - name: Run linters
      uses: golangci/golangci-lint-action@master
      with:
        version: v1.28
        args: --timeout 10m
        github-token: ${{ secrets.github_token }}
      if: env.GIT_DIFF
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Install Go
        uses: actions/setup-go@v2.1.3
        with:
          go-version: 1.15
      - name: Checkout code
        uses: actions/checkout@v2
      - name: run tests
        run: make test
      