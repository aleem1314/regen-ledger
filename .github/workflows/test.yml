name: Test

on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2.1.3
        with:
          go-version: 1.15
      - name: Display go version
        run: go version
      - run: make build
      - name: Archive production artifacts
        uses: actions/upload-artifact@v2
        with:
          name: dist-without-markdown
          path: |
            build
  unittest:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Install Go
        uses: actions/setup-go@v2.1.3
        with:
          go-version: 1.15
      - name: Checkout code
        uses: actions/checkout@v2
      - name: run tests
        run: make test
  cover_report:
    name: Cover report
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v2.1.3
        with:
          go-version: 1.15
      - name: Checkout code
        uses: actions/checkout@v2
      - name: run test cover
        run: make test-cover
      - name: Upload codecov report
        uses: codecov/codecov-action@v1
        with:
          token: ${secrets.CODECOV_TOKEN}
          file: coverage.txt