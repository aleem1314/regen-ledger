name: Test

on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2.1.3
        with:
          go-version: 1.15
      - name: Display go version
        run: go version
      - run: make build
  unittest:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Install Go
        uses: actions/setup-go@v2.1.3
        with:
          go-version: 1.15
      - name: Checkout code
        uses: actions/checkout@v2
      - name: run tests
        run: make test
  cover_report:
    name: Cover report
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v2.1.3
        with:
          go-version: 1.15
      - name: Checkout code
        uses: actions/checkout@v2
      - name: run test cover
        run: make test-cover
        run: bash <(curl -s https://codecov.io/bash) -f coverage.txt -t $CODECOV_TOKEN